# ==============================================================
# 1. SERVER CONFIGURATION
# ==============================================================
server:
  port: 8080
  servlet:
    context-path: /

# ==============================================================
# 2. SPRING CONFIGURATION
# ==============================================================
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/userdb
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# ==============================================================
# 3. APP CUSTOM CONFIGURATION
# ==============================================================
app:
  jwtSecret: ${JWT_SECRET}
  jwtExpirationMs: ${JWT_EXPIRATION_MS:300000}
  refreshTokenExpirationMs: ${REFRESH_TOKEN_EXPIRATION_MS:604800000}
  registration:
    otp:
      expiration-minutes: ${REGISTRATION_OTP_EXPIRATION_MINUTES:5}
      resend-cooldown-seconds: ${REGISTRATION_OTP_RESEND_COOLDOWN_SECONDS:60}
    mail:
      enabled: ${REGISTRATION_MAIL_ENABLED:false}
  inventory:
    expiry-alert-days: ${INVENTORY_EXPIRY_ALERT_DAYS:2}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

payment:
  vnpay:
    url: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
    api-url: "https://sandbox.vnpayment.vn/merchant_webapi/api/transaction"
    tmn-code: ${VNPAY_TMN_CODE}
    hash-secret: ${VNPAY_HASH_SECRET}
    return-url: ${VNPAY_RETURN_URL}

goong:
  api:
    key: ${GOONG_API_KEY}

frontend:
  url: "http://localhost:5173"
