spring:
  datasource:
    url: jdbc:h2:mem:pizzastore-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  mail:
    host: localhost
    port: 3025
    username: test-sender@example.com
    password: test-password
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            required: false

app:
  jwtSecret: test-jwt-secret-test-jwt-secret-test-jwt-secret
  jwtExpirationMs: 300000
  refreshTokenExpirationMs: 604800000
  registration:
    otp:
      expiration-minutes: 5
      resend-cooldown-seconds: 60
    mail:
      enabled: true
  inventory:
    expiry-alert-days: 2

cloudinary:
  cloud-name: test-cloud
  api-key: test-key
  api-secret: test-secret

payment:
  vnpay:
    url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    api-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction
    tmn-code: test-tmn
    hash-secret: test-hash-secret
    return-url: http://localhost/return

goong:
  api:
    key: test-goong-key

frontend:
  url: http://localhost:5173
